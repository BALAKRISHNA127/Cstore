<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CStores – Flipkart Style E‑Commerce</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header / Top Nav -->
  <header class="top-nav">
    <div class="nav-left">
      <div class="logo">
        C<span>Stores</span>
      </div>
      <div class="search-box">
        <input
          type="text"
          id="searchInput"
          placeholder="Search for products, brands and more"
        />
        <button id="searchBtn">Search</button>
      </div>
    </div>
    <div class="nav-right">
      <button class="nav-btn">Login</button>
      <button class="nav-btn">Become a Seller</button>
      <button class="cart-btn" id="openCartBtn">
        🛒 Cart
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <!-- Category bar -->
  <nav class="category-bar" id="categoryBar">
    <!-- Filled dynamically by JS -->
  </nav>

  <!-- Main content -->
  <main class="main-layout">
    <!-- Left: content -->
    <section class="content-area">
      <!-- Hero banner -->
      <section class="hero-banner">
        <div class="hero-text">
          <h1>Big Billion Days</h1>
          <p>Top deals on electronics, fashion and more.</p>
          <button>Shop Now</button>
        </div>
        <div class="hero-image">
          <!-- Use your own image or leave gradient -->
        </div>
      </section>

      <!-- Filters -->
      <section class="filters">
        <div class="filter-group">
          <label for="categorySelect">Category</label>
          <select id="categorySelect">
            <option value="all">All</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="sortSelect">Sort by</label>
          <select id="sortSelect">
            <option value="relevance">Relevance</option>
            <option value="lowToHigh">Price – Low to High</option>
            <option value="highToLow">Price – High to Low</option>
            <option value="rating">Rating</option>
          </select>
        </div>
      </section>

      <!-- Product grid -->
      <section class="product-grid" id="productGrid">
        <!-- Cards generated by JS -->
      </section>
    </section>
  </main>

  <!-- Cart drawer -->
  <aside class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h2>My Cart</h2>
      <button id="closeCartBtn" class="close-cart">✕</button>
    </div>
    <div class="cart-items" id="cartItemsContainer">
      <!-- Cart items injected by JS -->
    </div>
    <div class="cart-summary">
      <div class="row">
        <span>Subtotal</span>
        <span id="cartSubtotal">₹0</span>
      </div>
      <div class="row">
        <span>Discount</span>
        <span id="cartDiscount">-₹0</span>
      </div>
      <div class="row total">
        <span>Total</span>
        <span id="cartTotal">₹0</span>
      </div>
      <button class="checkout-btn">Place Order</button>
    </div>
  </aside>

  <!-- Overlay when cart open on mobile -->
  <div class="overlay" id="overlay"></div>

  <script src="script.js"></script>
</body>
</html>
